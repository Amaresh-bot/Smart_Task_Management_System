{% extends 'base.html' %}

{% block title %}Login | Smart Task Manager{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 200px);">
    <div class="col-md-5 col-lg-4">
        <!-- Glassmorphic Auth Card -->
        <div class="card bg-glass border border-dark-glow shadow-accent rounded-4 p-4 animate-scale-in">
            <div class="text-center mb-4">
                <div class="auth-icon-badge mb-3 mx-auto">
                    <i class="fa-solid fa-lock-open text-accent-cyan"></i>
                </div>
                <h2 class="h3 heading-font text-white mb-1">Welcome Back</h2>
                <p class="text-muted small">Manage your work efficiently with real-time updates</p>
            </div>
            
            <!-- Error message placeholder -->
            <div id="auth-alert" class="alert alert-danger d-none rounded-3 py-2 px-3 small border-0" role="alert">
                <i class="fa-solid fa-triangle-exclamation me-2"></i>
                <span id="auth-alert-message"></span>
            </div>

            <!-- Login Form -->
            <form id="login-form" method="POST" action="{{ url_for('auth.api_login') }}">
                <div class="mb-3">
                    <label for="username" class="form-label text-light-gray small fw-medium">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark-input border-dark-glow text-muted">
                            <i class="fa-regular fa-user"></i>
                        </span>
                        <input type="text" class="form-control bg-dark-input border-dark-glow text-white" id="username" name="username" placeholder="Enter username" required autocomplete="username">
                    </div>
                </div>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between mb-1">
                        <label for="password" class="form-label text-light-gray small fw-medium mb-0">Password</label>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-dark-input border-dark-glow text-muted">
                            <i class="fa-solid fa-key"></i>
                        </span>
                        <input type="password" class="form-control bg-dark-input border-dark-glow text-white" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                        <button type="button" class="btn btn-dark-input border-dark-glow text-muted px-3" id="toggle-password" aria-label="Toggle Password Visibility">
                            <i class="fa-regular fa-eye-slash" id="password-eye-icon"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-accent w-100 rounded-pill py-2 fw-semibold d-flex align-items-center justify-content-center gap-2" id="login-submit-btn">
                    <span>Log In</span>
                    <i class="fa-solid fa-arrow-right animate-arrow"></i>
                </button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-light-gray small mb-0">
                    Don't have an account? 
                    <a href="{{ url_for('auth.register_view') }}" class="text-accent-cyan text-decoration-none fw-medium hover-underline" id="signup-link">Create one here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const toggleBtn = document.getElementById("toggle-password");
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.getElementById("password-eye-icon");
        
        // Handle password visibility toggle
        if (toggleBtn && passwordInput && eyeIcon) {
            toggleBtn.addEventListener("click", function() {
                if (passwordInput.type === "password") {
                    passwordInput.type = "text";
                    eyeIcon.classList.remove("fa-eye-slash");
                    eyeIcon.classList.add("fa-eye");
                } else {
                    passwordInput.type = "password";
                    eyeIcon.classList.remove("fa-eye");
                    eyeIcon.classList.add("fa-eye-slash");
                }
            });
        }
    });
</script>
{% endblock %}
